<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:transparent}
  .wm{
    display:flex;align-items:center;gap:14px;
    padding:24px 28px;
  }
  .glyph{
    width:46px;height:46px;border-radius:14px;
    background:linear-gradient(135deg,#4dd8ff,#2ef2a0);
    display:flex;align-items:center;justify-content:center;
    color:#03111a;font-weight:800;font-size:22px;letter-spacing:-.02em;
    box-shadow:0 0 24px rgba(77,216,255,.25), inset 0 1px 0 rgba(255,255,255,.4);
    font-family:'Outfit',sans-serif;
  }
  .text{display:flex;flex-direction:column;line-height:1}
  .text .a{color:var(--cyan);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:800;margin-bottom:4px}
  .text .b{color:var(--fg1);font-size:26px;font-weight:800;letter-spacing:-.01em}
</style>
</head><body>
<div class="wm">
  <div class="glyph">CB</div>
  <div class="text">
    <div class="a">Smadex × HackUPC</div>
    <div class="b">Creative Boardroom</div>
  </div>
</div>
</body></html>
